<!DOCTYPE html>
<html>
<head>
  <title>Motor Control</title>

  <style>
    body {
      text-align: center;
      background: #0f172a;
      color: white;
      font-family: Arial;
    }

    button {
      padding: 15px;
      margin: 10px;
      font-size: 18px;
      border-radius: 10px;
      cursor: pointer;
    }

    input {
      padding: 10px;
      margin: 10px;
      border-radius: 5px;
      border: none;
    }
  </style>
</head>

<body>

<h1>3-Phase Motor Control</h1>

<!-- LOGIN -->
<div id="login">
  <input type="email" id="email" placeholder="Email"><br>
  <input type="password" id="password" placeholder="Password"><br>
  <button onclick="login()">Login</button>
</div>

<!-- CONTROL PANEL -->
<div id="panel" style="display:none;">
  <button onclick="startMotor()">START</button>
  <button onclick="stopMotor()">STOP</button><br>

  <input type="number" id="time" placeholder="Seconds">
  <button onclick="setTimer()">TIMER</button>

  <h2 id="temp">Temp: --</h2>
  <h2 id="status">Status: --</h2>
</div>

<!-- FIREBASE SCRIPT -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

// 🔴 REPLACE WITH YOUR REAL CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyDL35HgLN3vpIRQjcYSgBzX9uAaj8TWF9A",
  authDomain: "motor-scada-5320c.firebaseapp.com",
  databaseURL: "https://motor-scada-5320c-default-rtdb.firebaseio.com",
  projectId: "motor-scada-5320c",
  storageBucket: "motor-scada-5320c.firebasestorage.app",
  messagingSenderId: "656759651703",
  appId: "1:656759651703:web:9d4e9328237691cf3eb572",
  measurementId: "G-ZB397X7TMC"
};

// INIT
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

// LOGIN
window.login = function () {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  signInWithEmailAndPassword(auth, email, password)
    .then(() => {
      document.getElementById("login").style.display = "none";
      document.getElementById("panel").style.display = "block";
    })
    .catch((error) => {
      alert(error.message);
      console.error(error);
    });
};

// START
window.startMotor = function () {
  set(ref(db, "motor/control"), {
    command: "START"
  });
};

// STOP
window.stopMotor = function () {
  set(ref(db, "motor/control"), {
    command: "STOP"
  });
};

// TIMER
window.setTimer = function () {
  const t = document.getElementById("time").value;

  set(ref(db, "motor/control"), {
    command: "TIMER",
    value: Number(t)
  });
};

// LIVE DATA
onValue(ref(db, "motor"), (snapshot) => {
  const data = snapshot.val();
  if (!data) return;

  document.getElementById("temp").innerText = "Temp: " + data.temp;
  document.getElementById("status").innerText = "Status: " + data.state;

  // 🔥 Temperature warning
  if (data.temp > 75) {
    document.getElementById("temp").style.color = "red";
  } else {
    document.getElementById("temp").style.color = "white";
  }

  // ✅ Status color
  if (data.state === "RUNNING") {
    document.getElementById("status").style.color = "lime";
  } else {
    document.getElementById("status").style.color = "red";
  }
});

</script>

</body>
</html>
